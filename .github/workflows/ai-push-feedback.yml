name: AI Push Feedback

on:
  workflow_call:
    inputs:
      target_branches:
        description: "분석할 브랜치 목록(JSON 배열 문자열)"
        required: false
        type: string
        default: '["main","dev","develop"]'
      max_files:
        description: "커밋당 AI에 보낼 최대 파일 수"
        required: false
        type: number
        default: 10
      max_patch_chars:
        description: "파일당 최대 patch 길이"
        required: false
        type: number
        default: 4000
      filtered_commit_shas:
        description: "[AI]가 붙은 커밋 SHA 목록(JSON 배열 문자열)"
        required: false
        type: string
        default: "[]"
    secrets:
      OPENAI_API_KEY:
        required: true

permissions:
  contents: write

jobs:
  feedback:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout caller repository head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Generate AI feedback and comment on AI commits
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_URL: ${{ github.api_url }}
          INPUT_TARGET_BRANCHES: ${{ inputs.target_branches }}
          INPUT_MAX_FILES: ${{ inputs.max_files }}
          INPUT_MAX_PATCH_CHARS: ${{ inputs.max_patch_chars }}
          INPUT_FILTERED_COMMIT_SHAS: ${{ inputs.filtered_commit_shas }}
          INPUT_CONTEXT_DIR: ".ai-context"
        run: |
          cat > script.mjs <<'EOF'
          import fs from "fs";
          import path from "path";

          const AI_COMMENT_MARKER = "<!-- ai-push-feedback:v1 -->";

          const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));

          const githubToken = process.env.GITHUB_TOKEN;
          const openaiApiKey = process.env.OPENAI_API_KEY;
          const repoFullName = process.env.GITHUB_REPOSITORY;
          const githubApiUrl = process.env.GITHUB_API_URL;
          const targetBranches = JSON.parse(process.env.INPUT_TARGET_BRANCHES || '["main","dev","develop"]');
          const maxFiles = Number(process.env.INPUT_MAX_FILES || "10");
          const maxPatchChars = Number(process.env.INPUT_MAX_PATCH_CHARS || "4000");
          const filteredCommitShas = JSON.parse(process.env.INPUT_FILTERED_COMMIT_SHAS || "[]");
          const contextDir = process.env.INPUT_CONTEXT_DIR || ".ai-context";

          if (!repoFullName) throw new Error("GITHUB_REPOSITORY 없음");
          if (!githubToken) throw new Error("GITHUB_TOKEN 없음");
          if (!openaiApiKey) throw new Error("OPENAI_API_KEY 없음");

          const [owner, repo] = repoFullName.split("/");
          const ref = event.ref || "";
          const branch = ref.replace("refs/heads/", "");
          const pusher = event.pusher?.name || "unknown";

          function truncate(text, maxLen) {
            if (!text) return "";
            if (text.length <= maxLen) return text;
            return text.slice(0, maxLen) + "\n...[truncated]";
          }

          function shouldAnalyzeFile(filename) {
            return filename.toLowerCase().endsWith(".cs");
          }

          function getCommitTitle(commitMessage) {
            return (commitMessage || "").split("\n")[0] || "";
          }

          function isAiCommitTitle(commitMessage) {
            return getCommitTitle(commitMessage).startsWith("[AI]");
          }

          function readJsonSafe(filePath, fallback) {
            try {
              if (!fs.existsSync(filePath)) return fallback;
              return JSON.parse(fs.readFileSync(filePath, "utf8"));
            } catch {
              return fallback;
            }
          }

          function safeArray(value) {
            return Array.isArray(value) ? value : [];
          }

          function uniq(values) {
            return [...new Set(values.filter(Boolean))];
          }

          function limit(values, maxCount = 8) {
            return values.slice(0, maxCount);
          }

          function shortList(values, maxCount = 8) {
            const arr = limit(uniq(values), maxCount);
            return arr.length > 0 ? arr.join(", ") : "-";
          }

          function formatNumberList(values, maxCount = 8) {
            const arr = limit(safeArray(values), maxCount);
            return arr.length > 0 ? arr.join(", ") : "-";
          }

          function loadContext() {
            const projectProfile = readJsonSafe(path.join(contextDir, "project_profile.json"), null);
            const filesIndex = readJsonSafe(path.join(contextDir, "files_index.json"), []);
            const relationsIndex = readJsonSafe(path.join(contextDir, "relations_index.json"), []);
            const riskIndex = readJsonSafe(path.join(contextDir, "risk_index.json"), []);
            const contextMeta = readJsonSafe(path.join(contextDir, "context_meta.json"), null);

            const exists =
              !!projectProfile &&
              Array.isArray(filesIndex) &&
              Array.isArray(relationsIndex) &&
              Array.isArray(riskIndex);

            return {
              exists,
              projectProfile,
              filesIndex,
              relationsIndex,
              riskIndex,
              contextMeta
            };
          }

          function buildContextGraph(context) {
            const fileMetaByPath = new Map();
            const riskByFile = new Map();
            const classToFiles = new Map();
            const edgesByFile = new Map();
            const roleToFiles = new Map();

            for (const meta of context.filesIndex || []) {
              fileMetaByPath.set(meta.path, meta);
              const riskMeta = (context.riskIndex || []).find(item => item.file_id === meta.path) || null;
              if (riskMeta) {
                riskByFile.set(meta.path, riskMeta);
              }

              const classNames = uniq([
                meta.main_class_name,
                ...safeArray(meta.classes).map(cls => cls.name)
              ]);

              for (const className of classNames) {
                if (!classToFiles.has(className)) {
                  classToFiles.set(className, new Set());
                }
                classToFiles.get(className).add(meta.path);
              }

              for (const role of safeArray(meta.guessed_roles)) {
                if (!roleToFiles.has(role)) {
                  roleToFiles.set(role, new Set());
                }
                roleToFiles.get(role).add(meta.path);
              }
            }

            function addEdge(fromFile, toFile, detail) {
              if (!fromFile || !toFile || fromFile === toFile) return;
              if (!fileMetaByPath.has(fromFile) || !fileMetaByPath.has(toFile)) return;

              if (!edgesByFile.has(fromFile)) {
                edgesByFile.set(fromFile, []);
              }

              const key = `${detail.relation_type}|${detail.via}|${toFile}|${detail.direction}`;
              const existing = edgesByFile.get(fromFile).find(item => item.key === key);
              if (existing) return;

              edgesByFile.get(fromFile).push({
                key,
                toFile,
                relation_type: detail.relation_type,
                via: detail.via,
                strength: detail.strength,
                direction: detail.direction
              });
            }

            for (const relation of context.relationsIndex || []) {
              const fromFile = relation.from_file;
              const targetFiles = [...(classToFiles.get(relation.to_type) || [])];

              for (const targetFile of targetFiles) {
                addEdge(fromFile, targetFile, {
                  relation_type: relation.relation_type,
                  via: relation.to_type,
                  strength: relation.strength || 1,
                  direction: "out"
                });

                addEdge(targetFile, fromFile, {
                  relation_type: `used-by:${relation.relation_type}`,
                  via: relation.from_class || fromFile,
                  strength: relation.strength || 1,
                  direction: "in"
                });
              }
            }

            return {
              fileMetaByPath,
              riskByFile,
              classToFiles,
              edgesByFile,
              roleToFiles
            };
          }

          function collectRelatedMeta(startPaths, graph, options = {}) {
            const maxDepth = options.maxDepth ?? 3;
            const maxNodes = options.maxNodes ?? 14;

            const queue = [];
            const depthByFile = new Map();
            const reasonsByFile = new Map();

            for (const startPath of startPaths) {
              if (!graph.fileMetaByPath.has(startPath)) continue;
              depthByFile.set(startPath, 0);
              reasonsByFile.set(startPath, ["변경된 파일"]);
              queue.push(startPath);
            }

            while (queue.length > 0) {
              const current = queue.shift();
              const currentDepth = depthByFile.get(current) ?? 0;

              if (currentDepth >= maxDepth) continue;

              const edges = graph.edgesByFile.get(current) || [];
              edges.sort((a, b) => (b.strength || 0) - (a.strength || 0));

              for (const edge of edges) {
                const nextFile = edge.toFile;
                if (!graph.fileMetaByPath.has(nextFile)) continue;

                const nextDepth = currentDepth + 1;
                const reason = `${edge.direction === "out" ? "연결" : "역연결"}:${edge.relation_type}(${edge.via})`;

                if (!depthByFile.has(nextFile)) {
                  depthByFile.set(nextFile, nextDepth);
                  reasonsByFile.set(nextFile, [reason]);
                  queue.push(nextFile);
                } else {
                  const existingDepth = depthByFile.get(nextFile);
                  if (nextDepth < existingDepth) {
                    depthByFile.set(nextFile, nextDepth);
                    queue.push(nextFile);
                  }
                  const reasons = reasonsByFile.get(nextFile) || [];
                  if (!reasons.includes(reason)) {
                    reasons.push(reason);
                    reasonsByFile.set(nextFile, reasons);
                  }
                }
              }
            }

            const startRoleSet = new Set();
            for (const startPath of startPaths) {
              const meta = graph.fileMetaByPath.get(startPath);
              for (const role of safeArray(meta?.guessed_roles)) {
                startRoleSet.add(role);
              }
            }

            if (depthByFile.size < maxNodes) {
              const candidates = [];

              for (const [filePath, meta] of graph.fileMetaByPath.entries()) {
                if (depthByFile.has(filePath)) continue;

                const roles = safeArray(meta.guessed_roles);
                const overlap = roles.filter(role => startRoleSet.has(role)).length;
                if (overlap <= 0) continue;

                const riskScore = graph.riskByFile.get(filePath)?.risk_score || 0;
                const relationCount = (graph.edgesByFile.get(filePath) || []).length;

                candidates.push({
                  filePath,
                  overlap,
                  riskScore,
                  relationCount
                });
              }

              candidates.sort((a, b) =>
                b.overlap - a.overlap ||
                b.riskScore - a.riskScore ||
                b.relationCount - a.relationCount ||
                a.filePath.localeCompare(b.filePath)
              );

              for (const item of candidates) {
                if (depthByFile.size >= maxNodes) break;
                depthByFile.set(item.filePath, 99);
                reasonsByFile.set(item.filePath, ["같은 역할 태그"]);
              }
            }

            const ordered = [...depthByFile.entries()]
              .sort((a, b) => a[1] - b[1] || a[0].localeCompare(b[0]))
              .map(([filePath, depth]) => ({
                filePath,
                depth,
                meta: graph.fileMetaByPath.get(filePath),
                risk: graph.riskByFile.get(filePath) || null,
                reasons: reasonsByFile.get(filePath) || []
              }));

            return ordered;
          }

          function summarizeProjectProfile(projectProfile, contextMeta) {
            if (!projectProfile) {
              return "프로젝트 메타 없음";
            }

            const lines = [
              `- 전체 C# 파일 수: ${projectProfile.total_cs_files ?? 0}`,
              `- MonoBehaviour 파일 수: ${projectProfile.mono_behaviour_files ?? 0}`,
              `- ScriptableObject 파일 수: ${projectProfile.scriptable_object_files ?? 0}`,
              `- Update 사용 파일 수: ${projectProfile.files_with_update ?? 0}`,
              `- 싱글톤 후보 수: ${projectProfile.singleton_candidates ?? 0}`,
              `- 공통 패턴: ${shortList(safeArray(projectProfile.common_patterns), 6)}`,
            ];

            const highCoupling = safeArray(projectProfile.high_coupling_classes)
              .slice(0, 5)
              .map(item => `${item.class_name}(${item.relation_count + item.referenced_type_count})`);

            if (highCoupling.length > 0) {
              lines.push(`- 고결합 클래스 상위: ${highCoupling.join(", ")}`);
            }

            if (contextMeta) {
              lines.push(`- 메타 빌드 모드: ${contextMeta.build_mode_used || "-"}`);
              lines.push(`- 메타 기준 커밋: ${contextMeta.source_commit_sha ? String(contextMeta.source_commit_sha).slice(0, 7) : "-"}`);
            }

            return lines.join("\n");
          }

          function summarizeFileMeta(meta, riskMeta, extra = {}) {
            const lines = [
              `- Path: ${meta.path}`,
              `  Class: ${meta.main_class_name || "-"}`,
              `  UnityType: ${meta.unity_type || "None"}`,
              `  Roles: ${shortList(safeArray(meta.guessed_roles), 6)}`,
              `  UnityMessages: ${shortList(safeArray(meta.unity_messages), 6)}`,
              `  SummarySignals: ${shortList(safeArray(meta.summary_signals), 6)}`,
              `  Refs: ${shortList(safeArray(meta.referenced_types), 8)}`
            ];

            if (safeArray(meta.component_access_types).length > 0) {
              lines.push(`  ComponentAccess: ${shortList(safeArray(meta.component_access_types), 8)}`);
            }

            if (safeArray(meta.singleton_access_types).length > 0) {
              lines.push(`  SingletonAccess: ${shortList(safeArray(meta.singleton_access_types), 6)}`);
            }

            if (riskMeta) {
              lines.push(`  RiskFlags: ${shortList(safeArray(riskMeta.risk_flags), 8)}`);
              lines.push(`  RiskScore: ${riskMeta.risk_score ?? 0}`);
            }

            if (extra.reasons && extra.reasons.length > 0) {
              lines.push(`  ConnectedBecause: ${shortList(extra.reasons, 6)}`);
            }

            return lines.join("\n");
          }

          function buildMetaPayloadForPrompt(changedPaths, context) {
            if (!context.exists) {
              return {
                hasContext: false,
                projectProfileText: "프로젝트 메타 없음",
                changedMetaText: "프로젝트 메타 없음",
                relatedMetaText: "프로젝트 메타 없음",
                relatedCount: 0,
                impactedRoles: []
              };
            }

            const graph = buildContextGraph(context);

            const changedMetaEntries = changedPaths
              .filter(filePath => graph.fileMetaByPath.has(filePath))
              .map(filePath => ({
                filePath,
                meta: graph.fileMetaByPath.get(filePath),
                risk: graph.riskByFile.get(filePath) || null
              }));

            const relatedEntries = collectRelatedMeta(changedPaths, graph, {
              maxDepth: 3,
              maxNodes: 14
            });

            const relatedOnly = relatedEntries.filter(item => !changedPaths.includes(item.filePath));
            const impactedRoles = uniq(relatedEntries.flatMap(item => safeArray(item.meta?.guessed_roles)));

            const changedMetaText = changedMetaEntries.length > 0
              ? changedMetaEntries.map(item => summarizeFileMeta(item.meta, item.risk)).join("\n\n")
              : "변경 파일 메타 없음";

            const relatedMetaText = relatedOnly.length > 0
              ? relatedOnly
                  .slice(0, 10)
                  .map(item => summarizeFileMeta(item.meta, item.risk, { reasons: item.reasons }))
                  .join("\n\n")
              : "연관 파일 메타 없음";

            const relatedFileItems = relatedOnly
              .slice(0, 10)
              .map(item => ({
                path: item.filePath,
                reasons: item.reasons || [],
                roles: safeArray(item.meta?.guessed_roles)
              }));

            const relatedFilesCommentText = relatedFileItems.length > 0
              ? relatedFileItems
                  .map(item => `- \`${item.path}\`${item.reasons.length > 0 ? ` (사유: ${shortList(item.reasons, 4)})` : ""}`)
                  .join("\n")
              : "연관 파일 없음";

            return {
              hasContext: true,
              projectProfileText: summarizeProjectProfile(context.projectProfile, context.contextMeta),
              changedMetaText,
              relatedMetaText,
              relatedCount: relatedOnly.length,
              impactedRoles,
              relatedFileItems,
              relatedFilesCommentText
            };
          }

          async function githubFetch(url, options = {}) {
            const res = await fetch(url, {
              ...options,
              headers: {
                "Accept": "application/vnd.github+json",
                "Authorization": `Bearer ${githubToken}`,
                "X-GitHub-Api-Version": "2022-11-28",
                ...(options.headers || {})
              }
            });

            if (!res.ok) {
              const text = await res.text();
              throw new Error(`GitHub API 실패: ${res.status} ${res.statusText}\n${text}`);
            }

            return res.json();
          }

          async function getCommitData(commitSha) {
            const url = `${githubApiUrl}/repos/${owner}/${repo}/commits/${commitSha}`;
            return githubFetch(url);
          }

          async function listCommitComments(commitSha) {
            const url = `${githubApiUrl}/repos/${owner}/${repo}/commits/${commitSha}/comments`;
            return githubFetch(url);
          }

          async function createCommitComment(commitSha, body) {
            const url = `${githubApiUrl}/repos/${owner}/${repo}/commits/${commitSha}/comments`;

            const res = await fetch(url, {
              method: "POST",
              headers: {
                "Accept": "application/vnd.github+json",
                "Authorization": `Bearer ${githubToken}`,
                "X-GitHub-Api-Version": "2022-11-28",
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ body })
            });

            if (!res.ok) {
              const text = await res.text();
              throw new Error(`커밋 댓글 생성 실패 (${commitSha}): ${res.status} ${res.statusText}\n${text}`);
            }

            return res.json();
          }

          async function hasExistingAiComment(commitSha) {
            const comments = await listCommitComments(commitSha);

            return (comments || []).some(comment => {
              const body = comment.body || "";
              return body.includes(AI_COMMENT_MARKER);
            });
          }

          function buildPrompt(commitData, selectedFiles, csFileCount, analyzableCsFileCount, metaPayload) {
            const commitSha = commitData.sha;
            const commitMessage = commitData.commit?.message || "";
            const commitTitle = getCommitTitle(commitMessage);
            const author = commitData.commit?.author?.name || pusher;

            const fileSummaries = selectedFiles.map((file, index) => {
              return [
                `### File ${index + 1}`,
                `Path: ${file.filename}`,
                `Status: ${file.status}`,
                `Additions: ${file.additions ?? 0}`,
                `Deletions: ${file.deletions ?? 0}`,
                `Changes: ${file.changes ?? 0}`,
                "",
                "Patch:",
                "```diff",
                truncate(file.patch || "[patch unavailable]", maxPatchChars),
                "```"
              ].join("\n");
            }).join("\n\n");

            return `
          너는 Unity C# 코드 리뷰어다. 대상은 초보 개발자다.

          이번 리뷰는 patch만 보는 것이 아니라, 함께 제공된 프로젝트 메타를 참고해서
          "이번 변경이 프로젝트 전체에 어떤 영향이 갈 수 있는지"까지 분석한다.

          규칙:
          - patch가 1순위 근거다.
          - 프로젝트 메타는 영향 범위 / 연관 시스템 / 잠재 취약점 판단 보조 근거로만 사용한다.
          - patch와 메타에 없는 내용은 절대 추측하지 않는다.
          - 확실하지 않으면 "확실하지 않음"이라고 적는다.
          - 문제 없으면 "문제 없음"이라고 명확히 말한다.
          - 불필요한 칭찬은 하지 않는다.
          - 초보가 바로 고칠 수 있게 설명한다.
          - 수정 방법은 가능한 한 코드 예시나 구체적인 수정 방향으로 적는다.

          우선적으로 확인할 것:
          - null 참조 위험
          - Update 남용 여부
          - GetComponent / Find 반복 호출
          - SerializeField / public 사용 적절성
          - 책임 분리 (한 클래스에 기능 과다)
          - 매직 넘버
          - 성능 문제 (불필요한 연산, 반복)
          - 프로젝트 전체 영향 범위
          - 연관 시스템 초기화 순서 문제
          - 상태 소유 클래스 / 고결합 클래스 영향

          출력 형식:
          "AI로 생성되는 코멘트입니다. 참고용으로 봐주시면 감사하겠습니다." (제목)
          1. 총평
          2. 이번 변경이 프로젝트 전체에 줄 수 있는 영향
          3. 문제점 / 취약점 (없으면 "문제 없음")
          4. 수정 방법 (예시 코드나 수정 방향 포함)
          5. 추가로 확인할 부분

          중요:
          - vague한 설명 금지 ("개선 필요" 같은 말 금지)
          - "어디에 영향이 갈 수 있는지"를 프로젝트 메타 기준으로 설명한다.
          - 다만 메타만 보고 단정하지 말고, patch에 근거가 있을 때만 강하게 말한다.
          - 세세하게 설명하되, 신입이 따라갈 수 있게 적는다.

          메타 정보:
          - Repository: ${repoFullName}
          - Branch: ${branch}
          - Pusher: ${pusher}
          - Commit author: ${author}
          - Commit SHA: ${commitSha}
          - Commit title: ${commitTitle}
          - Changed C# files in commit: ${csFileCount}
          - Analyzable C# patch files in commit: ${analyzableCsFileCount}
          - Context available: ${metaPayload.hasContext ? "yes" : "no"}
          - Impacted role guess: ${shortList(metaPayload.impactedRoles || [], 8)}

          프로젝트 전체 메타 요약:
          ${metaPayload.projectProfileText}

          변경된 파일 메타:
          ${metaPayload.changedMetaText}

          재귀적으로 연결된 연관 파일 메타:
          ${metaPayload.relatedMetaText}

          분석 대상 patch:
          ${fileSummaries}
          `.trim();
          }

          async function callOpenAI(prompt) {
            const res = await fetch("https://api.openai.com/v1/responses", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${openaiApiKey}`
              },
              body: JSON.stringify({
                model: "gpt-4.1-mini",
                input: prompt
              })
            });

            if (!res.ok) {
              const text = await res.text();
              throw new Error(`OpenAI API 실패: ${res.status} ${res.statusText}\n${text}`);
            }

            const data = await res.json();

            const parts = [];
            if (typeof data.output_text === "string" && data.output_text.trim()) {
              parts.push(data.output_text.trim());
            } else {
              for (const item of data.output || []) {
                for (const content of item.content || []) {
                  if (content.type === "output_text" && content.text) {
                    parts.push(content.text);
                  }
                }
              }
            }

            const text = parts.join("\n").trim();
            if (!text) throw new Error("OpenAI 응답 텍스트 추출 실패");

            const usage = data.usage || {};
            const inputTokens = usage.input_tokens || 0;
            const outputTokens = usage.output_tokens || 0;

            const estimatedCost =
              (inputTokens / 1_000_000) * 0.80 +
              (outputTokens / 1_000_000) * 3.20;

            return {
              text,
              usage: {
                inputTokens,
                outputTokens,
                estimatedCost
              }
            };
          }

          function buildFinalComment(aiText, commitData, selectedFiles, skippedCount, csFileCount, analyzableCsFileCount, metaPayload) {
            const commitSha = commitData.sha;
            const commitMessage = commitData.commit?.message || "";
            const commitTitle = getCommitTitle(commitMessage);
            const fileList = selectedFiles.map(f => `- \`${f.filename}\``).join("\n");

            return [
              AI_COMMENT_MARKER,
              "## AI 자동 피드백",
              "",
              `- 브랜치: \`${branch}\``,
              `- 푸시한 사람: **${pusher}**`,
              `- 커밋: \`${commitSha.slice(0, 7)}\``,
              `- 커밋 제목: **${commitTitle}**`,
              `- 변경된 C# 파일 수: **${csFileCount}개**`,
              `- 분석 가능한 C# patch 파일 수: **${analyzableCsFileCount}개**`,
              `- 실제 AI 분석 C# 파일 수: **${selectedFiles.length}개**`,
              skippedCount > 0 ? `- 분석 제외된 C# patch 파일 수: **${skippedCount}개**` : null,
              `- 프로젝트 메타 반영: **${metaPayload.hasContext ? "예" : "아니오"}**`,
              metaPayload.hasContext ? `- 연관 메타 파일 수: **${metaPayload.relatedCount}개**` : null,
              metaPayload.hasContext ? `- 추정 영향 역할: **${shortList(metaPayload.impactedRoles || [], 8)}**` : null,
              "",
              "### 분석한 파일",
              fileList || "- 없음",
              "",
              metaPayload.hasContext ? "### 연관 파일" : null,
              metaPayload.hasContext ? metaPayload.relatedFilesCommentText : null,
              "",
              "### 피드백",
              aiText,
            ].filter(Boolean).join("\n");
          }

          const branchAllowed = targetBranches.includes(branch);
          if (!branchAllowed) {
            console.log(`브랜치 ${branch} 는 분석 대상 아님`);
            process.exit(0);
          }

          if (!Array.isArray(filteredCommitShas) || filteredCommitShas.length === 0) {
            console.log("[AI] 커밋 SHA가 전달되지 않음");
            process.exit(0);
          }

          const context = loadContext();
          if (context.exists) {
            console.log(`[META] .ai-context 로드 완료: files=${context.filesIndex.length}, relations=${context.relationsIndex.length}, risks=${context.riskIndex.length}`);
          } else {
            console.log("[META] .ai-context를 찾지 못함. patch 기반 분석으로만 진행");
          }

          console.log("전달받은 [AI] 커밋 SHA 목록:", filteredCommitShas);

          for (const commitSha of filteredCommitShas) {
            console.log(`\n=== 커밋 분석 시작: ${commitSha} ===`);

            const commitData = await getCommitData(commitSha);
            const commitMessage = commitData.commit?.message || "";
            const commitTitle = getCommitTitle(commitMessage);

            if (!isAiCommitTitle(commitMessage)) {
              console.log(`스킵: [AI] 커밋이 아님 - ${commitTitle}`);
              continue;
            }

            const alreadyCommented = await hasExistingAiComment(commitSha);
            if (alreadyCommented) {
              console.log(`스킵: 이미 AI 댓글이 존재함 - ${commitSha}`);
              continue;
            }

            const files = commitData.files || [];

            const csFiles = files.filter((file) => {
              if (!file.filename) return false;
              return shouldAnalyzeFile(file.filename);
            });

            const analyzableCsFiles = csFiles.filter((file) => !!file.patch);

            const csFileCount = csFiles.length;
            const analyzableCsFileCount = analyzableCsFiles.length;

            if (analyzableCsFileCount === 0) {
              console.log(`분석 가능한 C# patch 파일 없음: ${commitSha}`);
              continue;
            }

            const selectedFiles = analyzableCsFiles.slice(0, maxFiles);
            const skippedCount = analyzableCsFileCount - selectedFiles.length;
            const changedPaths = uniq(csFiles.map(file => file.filename));

            const metaPayload = buildMetaPayloadForPrompt(changedPaths, context);

            const prompt = buildPrompt(
              commitData,
              selectedFiles,
              csFileCount,
              analyzableCsFileCount,
              metaPayload
            );

            const aiResult = await callOpenAI(prompt);
            const aiText = aiResult.text;

            console.log(
              `[COST] commit=${commitSha} input_tokens=${aiResult.usage.inputTokens} output_tokens=${aiResult.usage.outputTokens} estimated_usd=${aiResult.usage.estimatedCost.toFixed(6)}`
            );

            const commentBody = buildFinalComment(
              aiText,
              commitData,
              selectedFiles,
              skippedCount,
              csFileCount,
              analyzableCsFileCount,
              metaPayload
            );

            await createCommitComment(commitSha, commentBody);
            console.log(`AI 피드백 댓글 작성 완료: ${commitSha}`);
          }

          console.log("모든 [AI] 커밋 분석 완료");
          EOF

          node script.mjs
